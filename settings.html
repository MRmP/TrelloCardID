<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Card ID Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: #fff;
      color: #172b4d;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #5e6c84;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid #dfe1e6;
      border-radius: 4px;
      font-size: 14px;
      color: #172b4d;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #0079bf; }
    .preview {
      margin-top: 12px;
      font-size: 13px;
      color: #5e6c84;
    }
    .preview span {
      display: inline-block;
      background: #0079bf;
      color: white;
      border-radius: 3px;
      padding: 2px 8px;
      font-weight: 600;
      font-size: 12px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: #0079bf;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #026aa7; }
    .saved {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: #61bd4f;
      display: none;
    }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>

  <label for="prefix">Prefix</label>
  <input type="text" id="prefix" placeholder="e.g. PROJ-" maxlength="20" />

  <label for="postfix">Postfix</label>
  <input type="text" id="postfix" placeholder="e.g. -2024" maxlength="20" />

  <div class="preview">
    Preview: <span id="preview">0001</span>
  </div>

  <button onclick="saveSettings()">Save Settings</button>
  <div class="saved" id="saved">✓ Saved!</div>

  <script>
    var t = TrelloPowerUp.iframe();

    // Load existing settings
    Promise.all([
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix')
    ]).then(function(values) {
      document.getElementById('prefix').value = values[0] || '';
      document.getElementById('postfix').value = values[1] || '';
      updatePreview();
    });

    function updatePreview() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      document.getElementById('preview').textContent = (prefix || '') + '0001' + (postfix || '');
    }

    document.getElementById('prefix').addEventListener('input', updatePreview);
    document.getElementById('postfix').addEventListener('input', updatePreview);

    function saveSettings() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      Promise.all([
        t.set('board', 'shared', 'prefix', prefix),
        t.set('board', 'shared', 'postfix', postfix)
      ]).then(function() {
        var saved = document.getElementById('saved');
        saved.style.display = 'block';
        setTimeout(function() {
          saved.style.display = 'none';
          t.closePopup();
        }, 1000);
      });
    }
  </script>
</body>
</html>
