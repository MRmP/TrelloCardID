<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Card ID Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: var(--ds-surface, #fff);
      color: var(--ds-text, #172b4d);
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ds-text-subtle, #5e6c84);
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid var(--ds-border, #dfe1e6);
      border-radius: 4px;
      font-size: 14px;
      color: var(--ds-text, #172b4d);
      background: var(--ds-background-input, #fafbfc);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--ds-border-focused, #0079bf); }
    .preview {
      margin-top: 12px;
      font-size: 13px;
      color: var(--ds-text-subtle, #5e6c84);
    }
    .preview span {
      display: inline-block;
      background: var(--ds-background-accent-blue-subtle, #0079bf);
      color: var(--ds-text-inverse, #fff);
      border-radius: 3px;
      padding: 2px 8px;
      font-weight: 600;
      font-size: 12px;
    }
    .btn-primary {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: var(--ds-background-accent-blue-subtle, #0079bf);
      color: var(--ds-text-inverse, #fff);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .divider {
      border: none;
      border-top: 1px solid var(--ds-border, #dfe1e6);
      margin: 16px 0 0 0;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ds-text-subtle, #5e6c84);
      margin: 12px 0 6px 0;
    }
    .btn-subtle {
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      color: var(--ds-text-subtle, #5e6c84);
      border: 1px solid var(--ds-border, #dfe1e6);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    .btn-subtle:hover {
      background: var(--ds-background-neutral, #f4f5f7);
      color: var(--ds-text, #172b4d);
    }
    .btn-subtle:disabled { opacity: 0.5; cursor: default; }
    .status {
      margin-top: 6px;
      font-size: 11px;
      color: var(--ds-text-subtle, #5e6c84);
      min-height: 16px;
    }
    .status.done { color: var(--ds-text-success, #61bd4f); font-weight: 600; }
    .status.error { color: var(--ds-text-danger, #eb5a46); }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>

  <label for="prefix">Prefix</label>
  <input type="text" id="prefix" placeholder="e.g. PROJ-" maxlength="20" />

  <label for="postfix">Postfix</label>
  <input type="text" id="postfix" placeholder="e.g. -2024" maxlength="20" />

  <div class="preview">Preview: <span id="preview">0001</span></div>

  <button class="btn-primary" id="save-btn" onclick="saveSettings()">Save Settings</button>

  <hr class="divider" />

  <div class="section-title">Bulk actions</div>
  <button class="btn-subtle" id="assign-btn" onclick="assignAll()">
    ↻ Re-apply prefix/postfix &amp; assign missing IDs
  </button>
  <div class="status" id="status"></div>

  <script>
    var t = TrelloPowerUp.iframe({ appKey: '2e23b655e062b3728cc2635e6f537b97', appName: 'Card ID Power-Up' });

    Promise.all([
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix')
    ]).then(function(values) {
      document.getElementById('prefix').value = values[0] || '';
      document.getElementById('postfix').value = values[1] || '';
      updatePreview();
    });

    function updatePreview() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      document.getElementById('preview').textContent = (prefix || '') + '0001' + (postfix || '');
    }

    document.getElementById('prefix').addEventListener('input', updatePreview);
    document.getElementById('postfix').addEventListener('input', updatePreview);

    function saveSettings() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      var btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      Promise.all([
        t.set('board', 'shared', 'prefix', prefix),
        t.set('board', 'shared', 'postfix', postfix)
      ]).then(function() {
        btn.textContent = '✓ Saved!';
        setTimeout(function() {
          btn.textContent = 'Save Settings';
          btn.disabled = false;
          t.closePopup();
        }, 800);
      });
    }

    function assignAll() {
      var btn = document.getElementById('assign-btn');
      var status = document.getElementById('status');
      btn.disabled = true;
      status.className = 'status';
      status.textContent = 'Loading cards...';

      t.cards('id').then(function(allCards) {
        var fetchPromises = allCards.map(function(card) {
          return t.get('card', 'shared', 'cardId', { card: card.id }).then(function(id) {
            return { card: card, existingId: id };
          });
        });
        return Promise.all(fetchPromises).then(function(results) {
          var maxId = 0;
          results.forEach(function(r) {
            if (r.existingId) {
              var num = parseInt(r.existingId, 10);
              if (!isNaN(num) && num > maxId) maxId = num;
            }
          });
          var toAssign = results.filter(function(r) { return !r.existingId; });
          if (toAssign.length === 0) {
            status.className = 'status done';
            status.textContent = '✓ All cards already have IDs.';
            btn.disabled = false;
            return;
          }
          status.textContent = 'Assigning ' + toAssign.length + ' IDs...';
          var assigned = 0;
          function assignNext(index) {
            if (index >= toAssign.length) {
              status.className = 'status done';
              status.textContent = '✓ Done! Assigned ' + assigned + ' IDs.';
              btn.disabled = false;
              return;
            }
            var nextId = String(maxId + index + 1).padStart(4, '0');
            t.set('card', 'shared', 'cardId', nextId, { card: toAssign[index].card.id }).then(function() {
              assigned++;
              status.textContent = 'Assigned ' + assigned + ' of ' + toAssign.length + '...';
              assignNext(index + 1);
            });
          }
          assignNext(0);
        });
      }).catch(function(err) {
        status.className = 'status error';
        status.textContent = 'Error: ' + err.message;
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
