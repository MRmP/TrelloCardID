<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Card ID Settings</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { padding: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-subtle);
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg-input);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--bg-blue); }
    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      transition: transform 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--text); }
    .color-swatch.transparent-swatch {
      background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 0 0 / 10px 10px;
    }
    .preview { margin-top: 12px; font-size: 13px; color: var(--text-subtle); }
    .preview-badge {
      display: inline-block;
      border-radius: 3px;
      padding: 2px 8px;
      font-weight: 600;
      font-size: 12px;
    }
    .btn-primary {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: var(--bg-blue);
      color: var(--text-on-blue);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0 0; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-subtle); margin: 12px 0 6px; }
    .btn-subtle {
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      color: var(--text-subtle);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    .btn-subtle:hover { background: var(--bg-neutral); color: var(--text); }
    .btn-subtle:disabled { opacity: 0.5; cursor: default; }
    .status { margin-top: 6px; font-size: 11px; color: var(--text-subtle); min-height: 16px; }
    .status.done { color: var(--text-success); font-weight: 600; }
    .status.error { color: var(--text-danger); }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>

  <label for="prefix">Prefix</label>
  <input type="text" id="prefix" placeholder="e.g. PROJ-" maxlength="20" />

  <label for="postfix">Postfix</label>
  <input type="text" id="postfix" placeholder="e.g. -2024" maxlength="20" />

  <label for="padding">Number format</label>
  <select id="padding">
    <option value="0">No padding — 1, 2, 3...</option>
    <option value="2">2 digits — 01, 02, 03...</option>
    <option value="3">3 digits — 001, 002, 003...</option>
    <option value="4" selected>4 digits — 0001, 0002, 0003...</option>
    <option value="5">5 digits — 00001, 00002...</option>
    <option value="6">6 digits — 000001, 000002...</option>
  </select>

  <label>Badge color</label>
  <div class="color-grid" id="color-grid"></div>

  <div class="preview">Preview: <span class="preview-badge" id="preview">BT-1</span></div>

  <button class="btn-primary" id="save-btn" onclick="saveSettings()">Save Settings</button>

  <hr class="divider" />
  <div class="section-title">Bulk actions</div>
  <button class="btn-subtle" id="assign-btn" onclick="assignAll()">
    ↻ Assign missing IDs to all cards
  </button>
  <div class="status" id="status"></div>

  <script>
    var t = TrelloPowerUp.iframe();
    var params = new URLSearchParams(window.location.search);
    if (params.get('theme') === 'dark') document.body.classList.add('dark');

    var COLORS = [
      { key: 'null',       label: 'Transparent', bg: null },
      { key: 'blue',       label: 'Blue',        bg: '#0079bf' },
      { key: 'green',      label: 'Green',       bg: '#61bd4f' },
      { key: 'orange',     label: 'Orange',      bg: '#ff9f1a' },
      { key: 'red',        label: 'Red',         bg: '#eb5a46' },
      { key: 'purple',     label: 'Purple',      bg: '#c377e0' },
      { key: 'pink',       label: 'Pink',        bg: '#ff78cb' },
      { key: 'sky',        label: 'Sky',         bg: '#00c2e0' },
      { key: 'lime',       label: 'Lime',        bg: '#51e898' },
      { key: 'light-gray', label: 'Gray',        bg: '#b6bbbf' },
    ];

    var selectedColor = 'null';

    // Build color swatches
    var grid = document.getElementById('color-grid');
    COLORS.forEach(function(c) {
      var sw = document.createElement('div');
      sw.className = 'color-swatch' + (c.bg === null ? ' transparent-swatch' : '');
      sw.title = c.label;
      sw.dataset.key = c.key;
      if (c.bg) sw.style.background = c.bg;
      sw.addEventListener('click', function() {
        selectedColor = c.key;
        document.querySelectorAll('.color-swatch').forEach(function(s) { s.classList.remove('selected'); });
        sw.classList.add('selected');
        updatePreview();
      });
      grid.appendChild(sw);
    });

    function updatePreview() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      var pad = parseInt(document.getElementById('padding').value, 10);
      var num = pad === 0 ? '1' : String(1).padStart(pad, '0');
      var badge = document.getElementById('preview');
      badge.textContent = (prefix || '') + num + (postfix || '');
      var colorDef = COLORS.find(function(c) { return c.key === selectedColor; });
      if (colorDef && colorDef.bg) {
        badge.style.background = colorDef.bg;
        badge.style.color = '#fff';
      } else {
        badge.style.background = 'transparent';
        badge.style.color = 'var(--text)';
        badge.style.border = '1px solid var(--border)';
      }
    }

    document.getElementById('prefix').addEventListener('input', updatePreview);
    document.getElementById('postfix').addEventListener('input', updatePreview);
    document.getElementById('padding').addEventListener('change', updatePreview);

    // Load settings
    Promise.all([
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix'),
      t.get('board', 'shared', 'padding'),
      t.get('board', 'shared', 'badgeColor')
    ]).then(function(values) {
      document.getElementById('prefix').value = values[0] || '';
      document.getElementById('postfix').value = values[1] || '';
      var pad = values[2];
      if (pad !== undefined && pad !== null) document.getElementById('padding').value = String(pad);
      selectedColor = (values[3] !== undefined && values[3] !== null) ? values[3] : 'null';
      var sw = document.querySelector('[data-key="' + selectedColor + '"]');
      if (sw) sw.classList.add('selected');
      updatePreview();
    });

    function saveSettings() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      var pad = parseInt(document.getElementById('padding').value, 10);
      var btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      Promise.all([
        t.set('board', 'shared', 'prefix', prefix),
        t.set('board', 'shared', 'postfix', postfix),
        t.set('board', 'shared', 'padding', pad),
        t.set('board', 'shared', 'badgeColor', selectedColor)
      ]).then(function() {
        btn.textContent = '✓ Saved!';
        setTimeout(function() {
          btn.textContent = 'Save Settings';
          btn.disabled = false;
          t.closePopup();
        }, 800);
      });
    }

    function formatId(num, pad) {
      return pad === 0 ? String(num) : String(num).padStart(pad, '0');
    }

    function assignAll() {
      var btn = document.getElementById('assign-btn');
      var status = document.getElementById('status');
      var pad = parseInt(document.getElementById('padding').value, 10);
      btn.disabled = true;
      status.className = 'status';
      status.textContent = 'Loading cards...';
      t.cards('id', 'name').then(function(allCards) {
        return t.get('board', 'shared', 'cardIdMap').then(function(idMap) {
          idMap = idMap || {};
          var maxId = 0;
          Object.values(idMap).forEach(function(n) {
            var num = parseInt(n, 10);
            if (!isNaN(num) && num > maxId) maxId = num;
          });
          var toAssign = allCards.filter(function(card) { return !idMap[card.id]; });
          if (toAssign.length === 0) {
            status.className = 'status done';
            status.textContent = '✓ All cards already have IDs.';
            btn.disabled = false;
            return;
          }
          toAssign.forEach(function(card, i) { idMap[card.id] = String(maxId + i + 1); });
          t.set('board', 'shared', 'cardIdMap', idMap).then(function() {
            status.className = 'status done';
            status.textContent = '✓ Done! Assigned ' + toAssign.length + ' IDs.';
            btn.disabled = false;
          });
        });
      }).catch(function(err) {
        status.className = 'status error';
        status.textContent = 'Error: ' + err.message;
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
