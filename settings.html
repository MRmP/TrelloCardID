<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Card ID Settings</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { padding: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-subtle);
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg-input);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--bg-blue); }
    .preview {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-subtle);
    }
    .preview span {
      display: inline-block;
      background: var(--bg-blue);
      color: var(--text-on-blue);
      border-radius: 3px;
      padding: 2px 8px;
      font-weight: 600;
      font-size: 12px;
    }
    .btn-primary {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: var(--bg-blue);
      color: var(--text-on-blue);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0 0 0; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-subtle);
      margin: 12px 0 6px 0;
    }
    .btn-subtle {
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      color: var(--text-subtle);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    .btn-subtle:hover { background: var(--bg-neutral); color: var(--text); }
    .btn-subtle:disabled { opacity: 0.5; cursor: default; }
    .status { margin-top: 6px; font-size: 11px; color: var(--text-subtle); min-height: 16px; }
    .status.done { color: var(--text-success); font-weight: 600; }
    .status.error { color: var(--text-danger); }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>

  <label for="prefix">Prefix</label>
  <input type="text" id="prefix" placeholder="e.g. PROJ-" maxlength="20" />

  <label for="postfix">Postfix</label>
  <input type="text" id="postfix" placeholder="e.g. -2024" maxlength="20" />

  <label for="padding">Number format</label>
  <select id="padding">
    <option value="0">No padding — 1, 2, 3...</option>
    <option value="2">2 digits — 01, 02, 03...</option>
    <option value="3">3 digits — 001, 002, 003...</option>
    <option value="4" selected>4 digits — 0001, 0002, 0003...</option>
    <option value="5">5 digits — 00001, 00002...</option>
    <option value="6">6 digits — 000001, 000002...</option>
  </select>

  <div class="preview">Preview: <span id="preview">0001</span></div>

  <button class="btn-primary" id="save-btn" onclick="saveSettings()">Save Settings</button>

  <hr class="divider" />
  <div class="section-title">Bulk actions</div>
  <button class="btn-subtle" id="assign-btn" onclick="assignAll()">
    ↻ Re-apply prefix/postfix &amp; assign missing IDs
  </button>
  <div class="status" id="status"></div>

  <script>
    var t = TrelloPowerUp.iframe();

    // Apply dark mode if Trello passes ?theme=dark
    var params = new URLSearchParams(window.location.search);
    if (params.get('theme') === 'dark') document.body.classList.add('dark');

    Promise.all([
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix'),
      t.get('board', 'shared', 'padding')
    ]).then(function(values) {
      document.getElementById('prefix').value = values[0] || '';
      document.getElementById('postfix').value = values[1] || '';
      var pad = values[2];
      if (pad !== undefined && pad !== null) document.getElementById('padding').value = String(pad);
      updatePreview();
    });

    function updatePreview() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      var pad = parseInt(document.getElementById('padding').value, 10);
      var num = pad === 0 ? '1' : String(1).padStart(pad, '0');
      document.getElementById('preview').textContent = (prefix || '') + num + (postfix || '');
    }

    document.getElementById('prefix').addEventListener('input', updatePreview);
    document.getElementById('postfix').addEventListener('input', updatePreview);
    document.getElementById('padding').addEventListener('change', updatePreview);

    function saveSettings() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      var pad = parseInt(document.getElementById('padding').value, 10);
      var btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      Promise.all([
        t.set('board', 'shared', 'prefix', prefix),
        t.set('board', 'shared', 'postfix', postfix),
        t.set('board', 'shared', 'padding', pad)
      ]).then(function() {
        btn.textContent = '✓ Saved!';
        setTimeout(function() {
          btn.textContent = 'Save Settings';
          btn.disabled = false;
          t.closePopup();
        }, 800);
      });
    }

    function formatId(num, pad) {
      return pad === 0 ? String(num) : String(num).padStart(pad, '0');
    }

    function assignAll() {
      var btn = document.getElementById('assign-btn');
      var status = document.getElementById('status');
      var pad = parseInt(document.getElementById('padding').value, 10);
      btn.disabled = true;
      status.className = 'status';
      status.textContent = 'Loading cards...';

      t.cards('id').then(function(allCards) {
        var fetchPromises = allCards.map(function(card) {
          return t.get('card', 'shared', 'cardId', { card: card.id }).then(function(id) {
            return { card: card, existingId: id };
          });
        });
        return Promise.all(fetchPromises).then(function(results) {
          var maxId = 0;
          results.forEach(function(r) {
            if (r.existingId) {
              var num = parseInt(r.existingId, 10);
              if (!isNaN(num) && num > maxId) maxId = num;
            }
          });
          var toAssign = results.filter(function(r) { return !r.existingId; });
          if (toAssign.length === 0) {
            status.className = 'status done';
            status.textContent = '✓ All cards already have IDs.';
            btn.disabled = false;
            return;
          }
          status.textContent = 'Assigning ' + toAssign.length + ' IDs...';
          var assigned = 0;
          function assignNext(index) {
            if (index >= toAssign.length) {
              status.className = 'status done';
              status.textContent = '✓ Done! Assigned ' + assigned + ' IDs.';
              btn.disabled = false;
              return;
            }
            var nextId = formatId(maxId + index + 1, pad);
            t.set('card', 'shared', 'cardId', nextId, { card: toAssign[index].card.id }).then(function() {
              assigned++;
              status.textContent = 'Assigned ' + assigned + ' of ' + toAssign.length + '...';
              assignNext(index + 1);
            });
          }
          assignNext(0);
        });
      }).catch(function(err) {
        status.className = 'status error';
        status.textContent = 'Error: ' + err.message;
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
