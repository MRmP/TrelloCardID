<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Debug</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { padding: 16px; font-size: 13px; }
    pre { background: var(--bg-neutral); padding: 10px; border-radius: 4px; overflow: auto; color: var(--text); font-size: 11px; margin-top: 8px; }
    h3 { color: var(--text); margin-bottom: 8px; }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <h3>Card ID Debug</h3>
  <pre id="out">Loading...</pre>
  <script>
    var t = TrelloPowerUp.iframe();
    var params = new URLSearchParams(window.location.search);
    if (params.get('theme') === 'dark') document.body.classList.add('dark');

    Promise.all([
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix'),
      t.get('board', 'shared', 'padding'),
      t.cards('id', 'name')
    ]).then(function(vals) {
      var prefix = vals[0], postfix = vals[1], padding = vals[2];
      var cards = vals[3];
      var result = { prefix: prefix, postfix: postfix, padding: padding, cardCount: cards.length, sampleCards: [] };

      var sample = cards.slice(0, 5);
      var promises = sample.map(function(card) {
        return t.get('card', 'shared', 'cardId', { card: card.id }).then(function(id) {
          return { name: card.name.substring(0, 30), cardId: id };
        });
      });
      Promise.all(promises).then(function(samples) {
        result.sampleCards = samples;
        document.getElementById('out').textContent = JSON.stringify(result, null, 2);
        t.sizeTo(document.body);
      });
    });
  </script>
</body>
</html>
