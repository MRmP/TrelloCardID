<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Assign All Card IDs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: var(--ds-surface, #fff);
      color: var(--ds-text, #172b4d);
    }
    p {
      font-size: 13px;
      color: var(--ds-text-subtle, #5e6c84);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 10px;
      background: var(--ds-background-accent-blue-subtle, #0079bf);
      color: var(--ds-text-inverse, #fff);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: default; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: var(--ds-text-subtle, #5e6c84);
      min-height: 18px;
    }
    .done { color: var(--ds-text-success, #61bd4f); font-weight: 600; }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <p>Assigns sequential IDs to all cards on this board that don't already have one. Existing IDs will not be changed.</p>
  <button id="btn" onclick="assignAll()">Assign IDs to all cards</button>
  <div class="status" id="status"></div>
  <script>
    var t = TrelloPowerUp.iframe();

    function assignAll() {
      var btn = document.getElementById('btn');
      var status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = 'Loading cards...';

      t.cards('id', 'name').then(function(allCards) {
        var fetchPromises = allCards.map(function(card) {
          return t.get('card', 'shared', 'cardId', { card: card.id }).then(function(id) {
            return { card: card, existingId: id };
          });
        });
        return Promise.all(fetchPromises).then(function(results) {
          var maxId = 0;
          results.forEach(function(r) {
            if (r.existingId) {
              var num = parseInt(r.existingId, 10);
              if (!isNaN(num) && num > maxId) maxId = num;
            }
          });
          var toAssign = results.filter(function(r) { return !r.existingId; });
          var assigned = 0;
          if (toAssign.length === 0) {
            status.textContent = 'All cards already have IDs!';
            status.className = 'status done';
            btn.disabled = false;
            return;
          }
          status.textContent = 'Assigning ' + toAssign.length + ' IDs...';
          function assignNext(index) {
            if (index >= toAssign.length) {
              status.textContent = '✓ Done! Assigned ' + assigned + ' IDs.';
              status.className = 'status done';
              setTimeout(function() { t.closePopup(); }, 1200);
              return;
            }
            var nextId = String(maxId + index + 1).padStart(4, '0');
            t.set('card', 'shared', 'cardId', nextId, { card: toAssign[index].card.id }).then(function() {
              assigned++;
              status.textContent = 'Assigned ' + assigned + ' of ' + toAssign.length + '...';
              assignNext(index + 1);
            });
          }
          assignNext(0);
        });
      }).catch(function(err) {
        status.textContent = 'Error: ' + err.message;
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
