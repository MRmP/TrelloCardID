<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Card ID</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 8px 12px;
      background: transparent;
      color: #172b4d;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #5e6c84;
      width: 52px;
      flex-shrink: 0;
    }
    input {
      flex: 1;
      padding: 5px 8px;
      border: 2px solid #dfe1e6;
      border-radius: 4px;
      font-size: 13px;
      color: #172b4d;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: #0079bf; }
    .preview-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      background: #0079bf;
      color: white;
      border-radius: 3px;
      padding: 2px 10px;
      font-weight: 600;
      font-size: 12px;
    }
    .preview-label {
      font-size: 11px;
      color: #5e6c84;
    }
    button {
      padding: 5px 12px;
      background: #0079bf;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #026aa7; }
    .saved { color: #61bd4f; font-size: 12px; font-weight: 600; display: none; }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>

  <div class="row">
    <label>Prefix</label>
    <input type="text" id="prefix" placeholder="e.g. PROJ-" maxlength="20" />
  </div>
  <div class="row">
    <label>Postfix</label>
    <input type="text" id="postfix" placeholder="e.g. -2024" maxlength="20" />
  </div>
  <div class="preview-row">
    <span class="preview-label">Preview:</span>
    <span class="badge" id="preview">0001</span>
    <button onclick="save()">Save</button>
    <span class="saved" id="saved">✓ Saved!</span>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    Promise.all([
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix')
    ]).then(function(vals) {
      document.getElementById('prefix').value = vals[0] || '';
      document.getElementById('postfix').value = vals[1] || '';
      updatePreview();
    });

    function updatePreview() {
      var p = document.getElementById('prefix').value;
      var s = document.getElementById('postfix').value;
      document.getElementById('preview').textContent = (p || '') + '0001' + (s || '');
    }

    document.getElementById('prefix').addEventListener('input', updatePreview);
    document.getElementById('postfix').addEventListener('input', updatePreview);

    function save() {
      var prefix = document.getElementById('prefix').value;
      var postfix = document.getElementById('postfix').value;
      Promise.all([
        t.set('board', 'shared', 'prefix', prefix),
        t.set('board', 'shared', 'postfix', postfix)
      ]).then(function() {
        var saved = document.getElementById('saved');
        saved.style.display = 'inline';
        setTimeout(function() { saved.style.display = 'none'; }, 1500);
        t.sizeTo('#content').catch(function() {});
      });
    }
  </script>
</body>
</html>
