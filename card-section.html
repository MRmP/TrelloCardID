<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Card ID</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { padding: 12px 16px; }
    .id-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .badge {
      display: inline-block;
      background: var(--bg-blue);
      color: var(--text-on-blue);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .no-id { font-size: 13px; color: var(--text-subtle); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .settings-row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-neutral);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    button.primary { background: var(--bg-blue); color: var(--text-on-blue); border-color: transparent; }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <div class="id-row">
    <span id="badge" class="badge" style="display:none"></span>
    <span id="no-id" class="no-id" style="display:none">No ID assigned yet</span>
  </div>
  <hr class="divider" />
  <div class="settings-row">
    <button id="assign-btn" style="display:none" onclick="assignId()">Assign ID</button>
    <button class="primary" onclick="openSettings()">⚙ Prefix / Postfix Settings</button>
  </div>
  <script>
    var t = TrelloPowerUp.iframe();
    var params = new URLSearchParams(window.location.search);
    if (params.get('theme') === 'dark') document.body.classList.add('dark');

    Promise.all([
      t.card('id'),
      t.get('board', 'shared', 'cardIdMap'),
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix'),
      t.get('board', 'shared', 'padding')
    ]).then(function(vals) {
      var cardId = vals[0].id;
      var idMap = vals[1] || {};
      var prefix = vals[2] || '', postfix = vals[3] || '';
      var pad = (vals[4] !== undefined && vals[4] !== null) ? parseInt(vals[4], 10) : 4;
      var num = idMap[cardId];
      if (num) {
        var formatted = pad === 0 ? String(parseInt(num, 10)) : String(parseInt(num, 10)).padStart(pad, '0');
        var badge = document.getElementById('badge');
        badge.textContent = prefix + formatted + postfix;
        badge.style.display = 'inline-block';
      } else {
        document.getElementById('no-id').style.display = 'inline';
        document.getElementById('assign-btn').style.display = 'block';
      }
      t.sizeTo(document.body);
    });

    function openSettings() {
      t.popup({ title: 'Card ID Settings', url: 'settings.html', height: 320 });
    }

    function assignId() {
      Promise.all([
        t.card('id'),
        t.get('board', 'shared', 'cardIdMap')
      ]).then(function(vals) {
        var cardId = vals[0].id;
        var idMap = vals[1] || {};
        var maxId = 0;
        Object.values(idMap).forEach(function(n) {
          var num = parseInt(n, 10); if (!isNaN(num) && num > maxId) maxId = num;
        });
        idMap[cardId] = String(maxId + 1);
        return t.set('board', 'shared', 'cardIdMap', idMap).then(function() {
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
