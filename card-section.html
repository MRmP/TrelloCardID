<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Card ID</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { padding: 12px 16px; }
    .id-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .badge {
      display: inline-block;
      background: var(--bg-blue);
      color: var(--text-on-blue);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .no-id { font-size: 13px; color: var(--text-subtle); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .settings-row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-neutral);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    button.primary { background: var(--bg-blue); color: var(--text-on-blue); border-color: transparent; }
  </style>
</head>
<body>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <div class="id-row">
    <span id="badge" class="badge" style="display:none"></span>
    <span id="no-id" class="no-id" style="display:none">No ID assigned yet</span>
  </div>
  <hr class="divider" />
  <div class="settings-row">
    <button id="assign-btn" style="display:none" onclick="assignId()">Assign ID</button>
    <button class="primary" onclick="openSettings()">⚙ Prefix / Postfix Settings</button>
  </div>
  <script>
    var t = TrelloPowerUp.iframe();

    var params = new URLSearchParams(window.location.search);
    if (params.get('theme') === 'dark') document.body.classList.add('dark');

    Promise.all([
      t.get('card', 'shared', 'cardId'),
      t.get('board', 'shared', 'prefix'),
      t.get('board', 'shared', 'postfix'),
      t.get('board', 'shared', 'padding')
    ]).then(function(vals) {
      var cardId = vals[0], prefix = vals[1] || '', postfix = vals[2] || '';
      var pad = (vals[3] !== undefined && vals[3] !== null) ? parseInt(vals[3], 10) : 4;
      if (cardId) {
        var formatted = pad === 0 ? String(parseInt(cardId, 10)) : String(parseInt(cardId, 10)).padStart(pad, '0');
        var badge = document.getElementById('badge');
        badge.textContent = prefix + formatted + postfix;
        badge.style.display = 'inline-block';
      } else {
        document.getElementById('no-id').style.display = 'inline';
        document.getElementById('assign-btn').style.display = 'block';
      }
      t.sizeTo(document.body);
    });

    function openSettings() {
      t.popup({ title: 'Card ID Settings', url: 'settings.html', height: 320 });
    }

    function assignId() {
      t.cards('id').then(function(allCards) {
        var promises = allCards.map(function(card) {
          return t.get('card', 'shared', 'cardId', { card: card.id });
        });
        return Promise.all(promises).then(function(ids) {
          var maxId = 0;
          ids.forEach(function(id) {
            if (id) { var n = parseInt(id, 10); if (!isNaN(n) && n > maxId) maxId = n; }
          });
          return t.set('card', 'shared', 'cardId', String(maxId + 1)).then(function() {
            window.location.reload();
          });
        });
      });
    }
  </script>
</body>
</html>
